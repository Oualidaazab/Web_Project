 ==> 📌 What Is Metadata in HTML?

Metadata in HTML is data about a webpage, not the visible content itself.

It provides structured information to:

Browsers (how to render the page)

Search engines (how to index it)

Social media platforms (how to preview it)

Security mechanisms (how to enforce policies)

Metadata is placed inside the <head> section of an HTML document. 


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Learn about HTML metadata and SEO basics">
    <meta name="keywords" content="HTML, metadata, SEO">
    <meta name="author" content="Walid">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Metadata Guide</title>
</head>
<body>
    <h1>Hello World</h1>
</body>
</html>
